<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f5;
  --card: #ffffff;
  --ink: #111;
  --ink-soft: #666;
  --ink-ghost: #aaa;
  --border: #e0e0e0;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --danger: #dc2626;
  --radius: 8px;
}

html, body {
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1.5rem;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  width: 100%;
  max-width: 380px;
}

h2 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

.sub {
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 1.5rem;
}

.sub a { color: var(--accent); text-decoration: none; }
.sub a:hover { text-decoration: underline; }

.banner {
  display: none;
  padding: 10px 12px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-bottom: 1rem;
  line-height: 1.5;
}

.banner.visible { display: block; }
.banner.error { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); }
.banner.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }


.field { margin-bottom: 0.875rem; }

.field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  margin-bottom: 5px;
}

.input-wrap { position: relative; }

.input-wrap input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--ink);
  background: #fff;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
}

.input-wrap input::placeholder { color: var(--ink-ghost); }

.input-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
}

.input-wrap input.has-icon { padding-right: 38px; }

.eye-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink-ghost);
  padding: 2px;
  display: flex;
  align-items: center;
}

.eye-btn:hover { color: var(--ink-soft); }

.submit-btn {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  color: #fff;
  cursor: pointer;
  position: relative;
  transition: background 0.15s;
  margin-top: 0.25rem;
}

.submit-btn:hover { background: var(--accent-hover); }
.submit-btn:active { transform: scale(0.99); }
.submit-btn.loading { opacity: 0.7; pointer-events: none; }
.submit-btn.loading .btn-text { opacity: 0; }

.spinner {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
}

.submit-btn.loading .spinner { opacity: 1; }

.spinner::after {
  content: '';
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <h2>Create account</h2>
  <p class="sub">Already have one? <a href="signin.html">Sign in</a></p>

  <div class="banner" id="banner"><span id="bannerText"></span></div>

  <form id="registerForm" onsubmit="handleRegister(event)" novalidate>
    <div class="field">
      <label for="name">Full name</label>
      <div class="input-wrap">
        <input type="text" id="name" placeholder="Jane Smith" autocomplete="name" required>
      </div>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" class="has-icon" required>
        <button type="button" class="eye-btn" id="togglePw" aria-label="Show password">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <span class="btn-text">Create account</span>
      <div class="spinner"></div>
    </button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── Config — replace with your values ──
  const SUPABASE_URL = 'https://your-project.supabase.co'
  const SUPABASE_ANON_KEY = 'your-anon-key'
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  // Password toggle
  let pwVisible = false
  document.getElementById('togglePw').addEventListener('click', () => {
    pwVisible = !pwVisible
    document.getElementById('password').type = pwVisible ? 'text' : 'password'
    document.getElementById('eyeIcon').innerHTML = pwVisible
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
  })

  // Email + password registration
  async function handleRegister(e) {
    e.preventDefault()
    const name = document.getElementById('name').value.trim()
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value

    if (!name || !email || !password) return showBanner('Please fill in all fields.', 'error')
    if (password.length < 8) return showBanner('Password must be at least 8 characters.', 'error')

    const btn = document.getElementById('submitBtn')
    btn.classList.add('loading')

    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: { data: { full_name: name } }
    })

    btn.classList.remove('loading')

    if (error) return showBanner(error.message, 'error')

    showBanner('Account created! Check your email to confirm your address.', 'success')
    document.getElementById('registerForm').reset()
  }

  // Banner helper
  function showBanner(msg, type) {
    const el = document.getElementById('banner')
    document.getElementById('bannerText').textContent = msg
    el.className = 'banner visible ' + type
  }
</script>
</body>
</html>
